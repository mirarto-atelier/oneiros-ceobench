name: azure-gpt-oneiros-smoke
description: Short smoke run for validating the CEO-Bench + Oneiros integration.

run:
  days: 28
  seed: 42
  scenario: default
  initial_cash: 1000000

model:
  provider: azure_openai
  # Inherited from ~/.oneiros/config.toml by default.
  model_label: ""
  deployment: ""
  reasoning_effort: high

azure_openai:
  # Reuse the Azure Responses settings already configured for Oneiros.
  # This keeps secrets out of this repo and out of committed config files.
  source: oneiros
  oneiros_config: ~/.oneiros/config.toml
  provider_section: auto
  endpoint: ""
  api_key_env: AZURE_OPENAI_API_KEY
  api_version: ""
  ca_bundle: ""

paths:
  ceobench_repo: ../../ceobench-src
  oneiros_repo: ../../oneiros

oneiros:
  bin: ${ONEIROS_BIN:-oneiros}
  memory_mode: run_scoped
  ingest_hidden_state: false

publication:
  publish_raw_transcripts: false
  publish_raw_oneiros_db: false
